name: 24/7 Relax Stream
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start Stream
        env:
          YOUTUBE_URL: ${{ secrets.YOUTUBE_URL }}
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
          # ئەم لینکە ڤیدیۆیەکی ئارامبەخشی سروشتە و بۆ لایڤ زۆر گونجاوە
          VIDEO_URL: "https://pixabay.com/videos/download/video-30588_medium.mp4" 
        run: |
          ffmpeg -re -stream_loop -1 -i "${VIDEO_URL}" \
          -c:v libx264 -preset veryfast -b:v 2000k -maxrate 2000k -bufsize 4000k \
          -g 60 -c:a aac -b:a 128k -ar 44100 -shortest \
          -f flv "${YOUTUBE_URL}/${YOUTUBE_KEY}"
