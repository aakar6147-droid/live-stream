name: 24/7 Professional Amazon Stream
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - name: Setup FFmpeg & Environment
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          
      - name: Start Professional Stream
        env:
          YOUTUBE_URL: ${{ secrets.YOUTUBE_URL }}
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
          # لینکێکی جێگیر و کوالێتی بەرز بۆ دارستانی ئەمازۆن
          VIDEO_URL: "https://archive.org/download/amazon-rainforest-4k/amazon-rainforest-4k.mp4"
        run: |
          ffmpeg -re -stream_loop -1 -i "${VIDEO_URL}" \
          -c:v libx264 -preset veryfast -b:v 4500k -maxrate 4500k -bufsize 9000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 192k -ar 44100 \
          -f flv "${YOUTUBE_URL}/${YOUTUBE_KEY}"
